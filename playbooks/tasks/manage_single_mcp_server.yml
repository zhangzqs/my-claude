---
# 管理单个 MCP 服务器

- name: "构建 MCP 配置 JSON 用于 {{ mcp_server.name }}"
  set_fact:
    mcp_config_json:
      type: "stdio"
      command: "{{ mcp_server.command }}"
      args: "{{ mcp_server.args }}"
      env: "{{ mcp_server.env | default({}) }}"
    mcp_scope: "{{ mcp_scope | default('local') }}"

- name: "尝试添加 {{ mcp_server.name }}（scope: {{ mcp_scope }}）"
  shell: "claude mcp add-json --scope {{ mcp_scope }} {{ mcp_server.name }} '{{ mcp_config_json | to_json }}'"
  register: add_mcp_result
  changed_when: add_mcp_result.rc == 0
  failed_when: false

- name: "添加成功，显示结果"
  debug:
    msg: "✓ 已添加 MCP 服务器：{{ mcp_server.name }} (scope: {{ mcp_scope }})"
  when: add_mcp_result.rc == 0

- name: "如果添加失败，删除后重新添加 {{ mcp_server.name }}"
  block:
    - name: "删除现有的 {{ mcp_server.name }}"
      shell: "claude mcp remove {{ mcp_server.name }}"
      changed_when: true
      failed_when: false

    - name: "重新添加 {{ mcp_server.name }}"
      shell: "claude mcp add-json --scope {{ mcp_scope }} {{ mcp_server.name }} '{{ mcp_config_json | to_json }}'"
      changed_when: true

    - name: "显示更新结果"
      debug:
        msg: "✓ 已更新 MCP 服务器：{{ mcp_server.name }} (scope: {{ mcp_scope }})"
  when: add_mcp_result.rc != 0
