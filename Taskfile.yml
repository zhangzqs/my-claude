# Taskfile.yml - my-claude-ansible 任务管理
# 安装: go install github.com/go-task/task/v3/cmd/task@latest
# 或: brew install go-task
# 使用: task --list 查看所有任务

version: '3'

vars:
  PLAYBOOK: playbooks/setup.yml
  ANSIBLE_CMD: uv run ansible-playbook

tasks:
  default:
    desc: 显示可用任务列表
    cmds:
      - task --list
    silent: true

  # ===== 主要部署任务 =====

  deploy:
    desc: 完整部署（安装插件 + 同步配置）
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }}'

  sync:
    desc: 仅同步配置
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --tags sync_config'

  install-plugins:
    desc: 仅安装插件
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --tags install_plugins'

  sync-claude-json:
    desc: 仅同步 claude.json（deep merge 模式）
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --tags sync_claude_json'

  check-claude-json:
    desc: 预览 claude.json 变更（不执行）
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --tags sync_claude_json --check --diff'

  # ===== CI/CD 任务（跳过确认） =====

  deploy-force:
    desc: 完整部署，跳过确认（CI/CD 用）
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} -e "{settings: {confirm_settings_update: false}, claude_json: {confirm_claude_json_update: false}}"'

  sync-force:
    desc: 同步配置，跳过确认（CI/CD 用）
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --tags sync_config,sync_claude_json -e "{settings: {confirm_settings_update: false}, claude_json: {confirm_claude_json_update: false}}"'

  # ===== 辅助任务 =====

  list-tags:
    desc: 查看所有可用 tags
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --list-tags'

  list-tasks:
    desc: 查看所有 Ansible 任务
    cmds:
      - '{{ .ANSIBLE_CMD }} {{ .PLAYBOOK }} --list-tasks'

  view-settings:
    desc: 查看当前 ~/.claude/settings.json
    cmds:
      - |
        if [ -f ~/.claude/settings.json ]; then
          cat ~/.claude/settings.json
        else
          echo "~/.claude/settings.json not found"
        fi
    silent: true

  view-claude-json:
    desc: 查看当前 ~/.claude.json
    cmds:
      - |
        if [ -f ~/.claude.json ]; then
          cat ~/.claude.json | jq .
        else
          echo "~/.claude.json not found"
        fi
    silent: true
